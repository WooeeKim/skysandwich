<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    html, body { margin: 0; padding: 0; }
    body {
        width: 1200px;
        height: 630px;
        background: #ffffff;
        font-family: 'Press Start 2P', cursive;
        position: relative;
        overflow: hidden;
    }
    .cloud-bar {
        position: absolute;
        left: 0;
        width: 100%;
        height: 110px;
        background: #BAE6FD;
        font-size: 60px;
        line-height: 110px;
        letter-spacing: 6px;
        white-space: nowrap;
        overflow: hidden;
    }
    .cloud-bar.top { top: 0; }
    .cloud-bar.bottom { bottom: 0; }
    .title {
        position: absolute;
        top: 175px;
        width: 100%;
        text-align: center;
        font-size: 52px;
        color: #000;
        letter-spacing: 2px;
    }
    .emoji {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -55%);
        font-size: 240px;
        line-height: 1;
    }
    .subtitle {
        position: absolute;
        bottom: 170px;
        width: 100%;
        text-align: center;
        font-size: 18px;
        color: #333;
        letter-spacing: 1px;
    }
</style>
</head>
<body>
<div class="cloud-bar top">☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️</div>
<div class="title">Become a Sky Sandwich</div>
<div class="emoji">🥪</div>
<div class="subtitle">Look. Become a sandwich.</div>
<div class="cloud-bar bottom">☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️☁️</div>
</body>
</html>
